<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Sensi Generator VIP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
color:white;

}


.bgimage{

position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;

}


body::before{

content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
z-index:-1;

}



.container{

width:420px;
max-width:92%;
background:rgba(15,15,15,0.75);
backdrop-filter:blur(14px);
border-radius:28px;
padding:25px;
border:1px solid rgba(255,215,0,0.35);
text-align:center;
box-shadow:0 0 30px rgba(255,215,0,0.25);

}



h1{

font-size:20px;
margin-bottom:15px;
color:gold;

}



input{

width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.07);
color:gold;
outline:none;
border:1px solid rgba(255,215,0,0.25);
font-weight:bold;

}



button{

width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#ffd700,#b8860b);
color:black;
font-weight:bold;
cursor:pointer;

}


button:hover{

transform:scale(1.05);

}



/* DROPDOWN */

.dropdown{

position:relative;
margin:10px 0;

}


.selected{

padding:12px;
border-radius:12px;
background:rgba(255,215,0,0.08);
border:1px solid rgba(255,215,0,0.3);
color:gold;
cursor:pointer;

}


.options{

display:none;
position:absolute;
top:100%;
width:100%;
background:#111;
border-radius:12px;
overflow:hidden;
z-index:5;

}


.options div{

padding:12px;
color:gold;
cursor:pointer;

}


.options div:hover{

background:rgba(255,215,0,0.2);

}



/* RESULT */

.result{

margin-top:15px;
text-align:left;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;

}


.stat{

margin:5px 0;

}



footer{

position:fixed;
bottom:10px;
font-size:12px;
color:gold;

}

</style>

</head>


<body>


<img src="https://i.imgur.com/y7cahch.png" class="bgimage">



<!-- LOGIN -->

<div id="loginScreen" class="container">


<h1>🔒 VIP ACCESS</h1>


<input 
type="password"
id="vipPassword"
placeholder="Enter VIP Password">


<button onclick="checkPassword()">
Unlock
</button>


</div>





<!-- GENERATOR -->

<div id="generator" class="container" style="display:none;">


<h1>👑 Smart Sensi Generator</h1>


<input 
type="text"
id="device"
placeholder="Type device (iPhone, Samsung, PC)">



<div class="dropdown">


<div class="selected" onclick="toggleDropdown()" id="selectedMode">

⚙️ Balanced Mode

</div>


<div class="options" id="optionsBox">


<div onclick="setMode('low','Low Mode')">
Low Mode
</div>


<div onclick="setMode('balanced','Balanced Mode')">
Balanced Mode
</div>


<div onclick="setMode('high','High Mode')">
High Mode
</div>


</div>

</div>



<button onclick="generate()">
Generate Sensitivity
</button>


<div id="output"></div>


</div>




<footer>
Made by 1Motive
</footer>




<script>


// ===== VIP PASSWORD =====

const VIP_PASSWORD = "1motive22";


function checkPassword(){

const input = document.getElementById("vipPassword").value.trim();


if(input === VIP_PASSWORD){

document.getElementById("loginScreen").style.display="none";

document.getElementById("generator").style.display="block";

}

else{

alert("❌ Incorrect password.\n\nContact 1motive651 via Discord or @1._motive on TikTok / @motive2calm on Instagram for access.");

}

}





// ===== GENERATOR =====


let mode="balanced";


function toggleDropdown(){

let box=document.getElementById("optionsBox");

box.style.display =
box.style.display==="block" ? "none" : "block";

}



function setMode(value,label){

mode=value;

document.getElementById("selectedMode").innerHTML =
"⚙️ "+label;

document.getElementById("optionsBox").style.display="none";

}



function rand(min,max){

return Math.floor(Math.random()*(max-min+1))+min;

}



function generate(){


let device=document.getElementById("device").value || "Unknown Device";

let output=document.getElementById("output");


let range;


if(mode==="low"){

range=[90,110];

}

else if(mode==="high"){

range=[130,200];

}

else{

range=[114,150];

}



output.innerHTML=`

<div class="result">


<h3 style="color:gold;">
📱 ${device} (${mode.toUpperCase()})
</h3>


<div class="stat">
General: ${rand(range[0],range[1])}
</div>


<div class="stat">
Red Dot: ${rand(range[0],range[1])}
</div>


<div class="stat">
2x Scope: ${rand(range[0],range[1])}
</div>


<div class="stat">
4x Scope: ${rand(range[0],range[1])}
</div>


<div class="stat">
AWM: ${rand(range[0],range[1])}
</div>


<div class="stat">
Free Look: ${rand(range[0],range[1])}
</div>


<div class="stat">
Fire Button: ${rand(40,60)}
</div>


</div>

`;

}



</script>


</body>
</html>
